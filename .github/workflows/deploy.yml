name: CI/CD Docker

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build & Push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest

      - name: Triển khai lên DevOps Classroom
        env:
          REPO: ${{ secrets.DOCKER_USERNAME }}/springboot-app
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          CONTAINER_PORT: "8080"
        run: |
          set -euo pipefail

          attempt=1
          max_attempts=3

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Gửi deploy webhook (lần $attempt/$max_attempts)..."

            RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "$DEPLOY_URL?repo=$REPO&tag=latest&slot=3&container_port=$CONTAINER_PORT&strict_container_port=1")
            BODY=$(echo "$RESPONSE" | sed '$d')
            CODE=$(echo "$RESPONSE" | tail -n1)

            echo "Webhook HTTP: $CODE"
            echo "::group::Chi tiết webhook JSON (attempt $attempt)"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"

            if [ "$CODE" -ge 200 ] && [ "$CODE" -lt 300 ]; then
              echo "Deploy thành công."
              exit 0
            fi

            if [ "$CODE" = "524" ] && [ "$attempt" -lt "$max_attempts" ]; then
              echo "Nhận 524 (gateway timeout). Đợi 15s rồi thử lại..."
              sleep 15
              attempt=$((attempt + 1))
              continue
            fi

            echo "Deploy thất bại với HTTP $CODE."
            exit 1
          done

          echo "Deploy thất bại sau $max_attempts lần thử."
          exit 1
